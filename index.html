<div id="gameContainer">

      保护基地 <span>🦅</span> 不被摧毁！
    </div>

<script>
// ==================== 游戏常量 ====================
const CELL = 24;                    // 每格像素
const COLS = 26;                    // 列数
const ROWS = 26;                    // 行数
const GAME_W = COLS * CELL;         // 游戏区宽 624
const GAME_H = ROWS * CELL;         // 游戏区高 624
const HUD_W = 170;                  // 信息栏宽
const CANVAS_W = GAME_W + HUD_W;    // 总宽
const CANVAS_H = GAME_H;            // 总高

const TILE = { EMPTY: 0, BRICK: 1, STEEL: 2, WATER: 3, TREE: 4, BASE: 5 };
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };

// ==================== 画布初始化 ====================
const canvas = document.getElementById('game');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;
const ctx = canvas.getContext('2d');

// ==================== 音效系统 ====================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep(freq, duration, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playBeep(800, 0.08, 'square', 0.06); }
function sfxHit() { playBeep(150, 0.12, 'sawtooth', 0.08); }
function sfxExplode() { playBeep(60, 0.3, 'sawtooth', 0.1); }
function sfxPowerUp() { playBeep(1200, 0.15, 'square', 0.07); setTimeout(() => playBeep(1600, 0.15, 'square', 0.07), 150); }
function sfxGameOver() { playBeep(200, 0.3, 'sawtooth', 0.1); setTimeout(() => playBeep(150, 0.3, 'sawtooth', 0.1), 300); setTimeout(() => playBeep(100, 0.5, 'sawtooth', 0.1), 600); }

// ==================== 游戏状态 ====================
let gameState = 'menu'; // menu | playing | paused | gameover | win
let score = 0;
let playerLives = 3;
let level = 1;
let enemiesRemaining = 0;
let enemiesSpawned = 0;
let maxEnemiesOnScreen = 4;
let totalEnemies = 20;
let spawnTimer = 0;
let spawnInterval = 120; // 帧
let player = null;
let enemies = [];
let bullets = [];
let particles = [];
let powerUps = [];
let map = [];
let baseAlive = true;
let keys = {};
let frameCount = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// ==================== 地图数据 ====================
const MAPS = [

  ],
  // 第2关 - 更多障碍
  [

    "....##..##..####..##..##....",
    "....##......####......##....",
    "..##......##....##......##..",
    "..##..##..##....##..##..##..",

function parseMap(mapData) {
  const grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const ch = mapData[r] ? mapData[r][c] : '.';
      switch (ch) {
        case '#': grid[r][c] = TILE.BRICK; break;
        case '@': grid[r][c] = TILE.STEEL; break;
        case '~': grid[r][c] = TILE.WATER; break;
        case '%': grid[r][c] = TILE.TREE; break;
        default:  grid[r][c] = TILE.EMPTY; break;
      }
    }
  }
  // 基地 - 底部中央
  const baseC = Math.floor(COLS / 2) - 1;
  const baseR = ROWS - 2;
  for (let dr = 0; dr < 2; dr++) {
    for (let dc = 0; dc < 4; dc++) {
      grid[baseR + dr][baseC + dc] = TILE.BASE;
    }
  }
  // 基地周围砖墙
  for (let dc = -1; dc <= 4; dc++) {
    if (dc >= 0 && dc < 4) continue;
    grid[baseR - 1][baseC + dc] = TILE.BRICK;
    grid[baseR + 2][baseC + dc] = TILE.BRICK;
  }
  for (let dr = -1; dr <= 2; dr++) {
    if (dr >= 0 && dr < 2) continue;
    grid[baseR + dr][baseC - 1] = TILE.BRICK;
    grid[baseR + dr][baseC + 4] = TILE.BRICK;
  }
  return grid;
}

// ==================== 坦克类 ====================
class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x;           // 像素坐标 (左上角)
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 2.5 : 1.2;
    this.size = CELL * 2; // 坦克宽高 = 2格
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 20 : 80;
    this.alive = true;
    this.hp = isPlayer ? 1 : 1;
    this.flashTimer = 0;
    this.aiDirTimer = 0;
    this.aiShootTimer = 0;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  getGridCol() { return Math.floor(this.cx / CELL); }
  getGridRow() { return Math.floor(this.cy / CELL); }

  collidesWith(x, y, w, h) {
    return (
      this.x < x + w &&
      this.x + this.size > x &&
      this.y < y + h &&
      this.y + this.size > y
    );
  }

  canMoveTo(x, y) {
    // 边界检查
    if (x < 0 || y < 0 || x + this.size > GAME_W || y + this.size > GAME_H) return false;
    // 地图碰撞 (检查坦克四个角所在的格子)
    const margin = 1;
    const checkPoints = [
      [x + margin, y + margin],
      [x + this.size - margin, y + margin],
      [x + margin, y + this.size - margin],
      [x + this.size - margin, y + this.size - margin],
    ];
    for (const [px, py] of checkPoints) {
      const c = Math.floor(px / CELL);
      const r = Math.floor(py / CELL);
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
      const tile = map[r][c];
      if (tile === TILE.BRICK || tile === TILE.STEEL || tile === TILE.BASE) return false;
      if (tile === TILE.WATER) return false;
    }
    // 与其他坦克碰撞
    const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this && e.alive)];
    if (!this.isPlayer) allTanks.push(player);
    for (const tank of allTanks) {
      if (!tank || !tank.alive) continue;
      if (tank === this) continue;
      if (tank.collidesWith(x, y, this.size, this.size)) return false;
    }
    return true;
  }

  move(dir) {
    this.dir = dir;
    let nx = this.x, ny = this.y;
    switch (dir) {
      case DIR.UP:    ny -= this.speed; break;
      case DIR.DOWN:  ny += this.speed; break;
      case DIR.LEFT:  nx -= this.speed; break;
      case DIR.RIGHT: nx += this.speed; break;
    }
    // 对齐到网格 (防止卡在墙角)
    if (dir === DIR.UP || dir === DIR.DOWN) {
      const cellX = Math.round(this.x / CELL) * CELL;
      if (Math.abs(nx - cellX) < this.speed + 0.5) nx = cellX;
    } else {
      const cellY = Math.round(this.y / CELL) * CELL;
      if (Math.abs(ny - cellY) < this.speed + 0.5) ny = cellY;
    }
    if (this.canMoveTo(nx, ny)) {
      this.x = nx;
      this.y = ny;
      return true;
    }
    // 尝试仅在一个轴移动
    if (dir === DIR.UP || dir === DIR.DOWN) {
      if (this.canMoveTo(this.x, ny)) { this.y = ny; return true; }
    } else {
      if (this.canMoveTo(nx, this.y)) { this.x = nx; return true; }
    }
    return false;
  }

  shoot() {
    if (this.shootCooldown > 0) return null;
    this.shootCooldown = this.shootDelay;
    const bx = this.cx - 3;
    const by = this.cy - 3;
    return new Bullet(bx, by, this.dir, this.isPlayer);
  }

  update() {
    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.flashTimer > 0) this.flashTimer--;
  }

  draw(ctx) {
    if (!this.alive) return;
    if (this.flashTimer > 0 && Math.floor(this.flashTimer / 3) % 2 === 0) return;
    ctx.save();
    ctx.translate(this.cx, this.cy);
    const angle = this.dir * Math.PI / 2;
    ctx.rotate(angle);

    // 坦克主体
    const s = this.size / 2; // 半宽
    const bodyColor = this.color;
    const trackColor = this.isPlayer ? '#2d7d2d' : '#8b0000';

    // 履带
    ctx.fillStyle = trackColor;
    ctx.fillRect(-s, -s + 3, s * 2, 5);          // 上履带
    ctx.fillRect(-s, s - 8, s * 2, 5);            // 下履带
    // 履带纹理
    ctx.fillStyle = '#111';
    for (let i = -s + 4; i < s - 4; i += 6) {
      ctx.fillRect(i, -s + 3, 2, 5);
      ctx.fillRect(i, s - 8, 2, 5);
    }
    // 车身
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-s + 4, -s + 8, s * 2 - 8, s * 2 - 16);
    // 炮塔
    ctx.fillStyle = this.isPlayer ? '#5b5' : '#c44';
    ctx.fillRect(-6, -6, 12, 12);
    // 炮管
    ctx.fillStyle = this.isPlayer ? '#3a3' : '#a22';
    ctx.fillRect(-3, -s + 4, 6, s - 10);
    // 炮管头
    ctx.fillStyle = '#fff';
    ctx.fillRect(-4, -s + 2, 8, 5);

    ctx.restore();
  }
}

// ==================== 子弹类 ====================
class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.speed = 5;
    this.size = 6;
    this.alive = true;
  }

  update() {
    switch (this.dir) {
      case DIR.UP:    this.y -= this.speed; break;
      case DIR.DOWN:  this.y += this.speed; break;
      case DIR.LEFT:  this.x -= this.speed; break;
      case DIR.RIGHT: this.x += this.speed; break;
    }
    // 边界
    if (this.x < 0 || this.x > GAME_W || this.y < 0 || this.y > GAME_H) {
      this.alive = false;
      return;
    }
    // 地图碰撞
    const c = Math.floor(this.x / CELL);
    const r = Math.floor(this.y / CELL);
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      const tile = map[r][c];
      if (tile === TILE.BRICK) {
        map[r][c] = TILE.EMPTY;
        this.alive = false;
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, '#c84');
        sfxHit();
        return;
      }
      if (tile === TILE.STEEL) {
        this.alive = false;
        spawnParticles(this.x, this.y, '#fff');
        sfxHit();
        return;
      }
      if (tile === TILE.BASE) {
        map[r][c] = TILE.EMPTY;
        this.alive = false;
        baseAlive = false;
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, '#f00', 20);
        sfxExplode();
        shakeTimer = 30;
        shakeIntensity = 8;
        return;
      }
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    ctx.fillStyle = this.isPlayer ? '#ff0' : '#f66';
    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
    // 光晕
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.x - 1, this.y - 1, 2, 2);
  }
}

// ==================== 粒子系统 ====================
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, color,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.random() * 15,
      maxLife: 30,
      size: 2 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles(ctx) {
  for (let p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ==================== 道具系统 ====================
class PowerUp {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type; // 'star' | 'tank' | 'timer' | 'bomb' | 'shield'
    this.size = CELL;
    this.alive = true;
    this.timer = 600; // 10秒后消失
  }
  update() {
    this.timer--;
    if (this.timer <= 0) this.alive = false;
    // 闪烁
    this.blink = this.timer < 120 && Math.floor(this.timer / 8) % 2 === 0;
  }
  draw(ctx) {
    if (!this.alive || this.blink) return;
    const cx = this.x + this.size / 2;
    const cy = this.y + this.size / 2;
    ctx.fillStyle = '#333';
    ctx.fillRect(this.x, this.y, this.size, this.size);
    ctx.strokeStyle = '#888';
    ctx.strokeRect(this.x, this.y, this.size, this.size);
    // 图标
    ctx.fillStyle = this.getColor();
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.getIcon(), cx, cy);
  }
  getColor() {
    switch (this.type) {
      case 'star': return '#ff0';
      case 'tank': return '#0f0';
      case 'timer': return '#f80';
      case 'bomb': return '#f00';
      case 'shield': return '#0ff';
    }
  }
  getIcon() {
    switch (this.type) {
      case 'star': return '★';
      case 'tank': return '🛡';
      case 'timer': return '⏱';
      case 'bomb': return '💣';
      case 'shield': return '🛡';
    }
  }
}

// ==================== 绘制地图 ====================
function drawMap(ctx) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL, y = r * CELL;
      const tile = map[r][c];
      switch (tile) {
        case TILE.BRICK:
          ctx.fillStyle = '#b5651d';
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#d4853b';
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL / 2 - 1);
          ctx.fillRect(x + 1, y + CELL / 2, CELL / 2 - 1, CELL / 2 - 1);
          ctx.fillRect(x + CELL / 2, y + CELL / 2 + 1, CELL / 2 - 1, CELL / 2 - 2);
          ctx.strokeStyle = '#8b4513';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, CELL, CELL);
          break;
        case TILE.STEEL:
          ctx.fillStyle = '#999';
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#bbb';
          ctx.fillRect(x + 3, y + 3, CELL - 6, CELL - 6);
          ctx.fillStyle = '#ddd';
          ctx.fillRect(x + 4, y + 4, CELL - 8, CELL - 8);
          ctx.strokeStyle = '#666';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, CELL, CELL);
          break;
        case TILE.WATER:
          ctx.fillStyle = '#2266cc';
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#3388ee';
          const waveOffset = Math.sin(frameCount * 0.1 + c + r) * 2;
          ctx.fillRect(x + 3, y + 3 + waveOffset, CELL - 6, 3);
          ctx.fillRect(x + 3, y + 12 + waveOffset, CELL - 6, 3);
          ctx.fillRect(x + 3, y + 18 + waveOffset, CELL - 6, 3);
          break;
        case TREE:
          ctx.fillStyle = '#2d5a1e';
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#3a7a28';
          for (let i = 0; i < 8; i++) {
            const lx = x + Math.random() * CELL * 0.8 + CELL * 0.1;
            const ly = y + Math.random() * CELL * 0.8 + CELL * 0.1;
            ctx.beginPath();
            ctx.arc(lx, ly, 3 + Math.random() * 4, 0, Math.PI * 2);
            ctx.fill();
          }
          break;
        case TILE.BASE:
          // 老鹰标志
          ctx.fillStyle = '#333';
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#ffcc00';
          ctx.beginPath();
          const bcx = x + CELL / 2, bcy = y + CELL / 2;
          // 简化鹰形
          ctx.fillStyle = '#ffd700';
          ctx.font = `${CELL - 4}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🦅', bcx, bcy);
          break;
        default:
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(x, y, CELL, CELL);
      }
    }
  }
}

// ==================== 绘制HUD ====================
function drawHUD(ctx) {
  const hx = GAME_W;
  // 背景
  ctx.fillStyle = '#222';
  ctx.fillRect(hx, 0, HUD_W, CANVAS_H);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.strokeRect(hx + 5, 5, HUD_W - 10, CANVAS_H - 10);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px "Courier New"';
  ctx.textAlign = 'center';

  let cy = 30;
  // 关卡
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`第 ${level} 关`, hx + HUD_W / 2, cy);
  cy += 35;

  // 分数
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Courier New"';
  ctx.fillText('分数', hx + HUD_W / 2, cy);
  cy += 20;
  ctx.font = 'bold 20px "Courier New"';
  ctx.fillStyle = '#0f0';
  ctx.fillText(score, hx + HUD_W / 2, cy);
  cy += 40;

  // 生命
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Courier New"';
  ctx.fillText('生命', hx + HUD_W / 2, cy);
  cy += 25;
  for (let i = 0; i < playerLives; i++) {
    ctx.fillStyle = '#4f4';
    ctx.fillRect(hx + 35 + i * 30, cy - 8, 20, 20);
    ctx.fillStyle = '#3a3';
    ctx.fillRect(hx + 38 + i * 30, cy - 5, 14, 14);
    ctx.fillStyle = '#2a2';
    ctx.fillRect(hx + 42 + i * 30, cy - 1, 6, 6);
  }
  cy += 45;

  // 剩余敌人
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Courier New"';
  ctx.fillText('剩余敌人', hx + HUD_W / 2, cy);
  cy += 20;
  ctx.font = 'bold 20px "Courier New"';
  ctx.fillStyle = '#f44';
  ctx.fillText(enemiesRemaining, hx + HUD_W / 2, cy);
  cy += 40;

  // 操作提示
  ctx.fillStyle = '#888';
  ctx.font = '11px "Courier New"';
  ctx.fillText('── 操作 ──', hx + HUD_W / 2, cy);
  cy += 20;
  ctx.fillText('↑↓←→ 移动', hx + HUD_W / 2, cy);
  cy += 18;
  ctx.fillText('WASD 移动', hx + HUD_W / 2, cy);
  cy += 18;
  ctx.fillText('空格 射击', hx + HUD_W / 2, cy);
  cy += 18;
  ctx.fillText('P 暂停', hx + HUD_W / 2, cy);
}

// ==================== 敌人生成 ====================
const ENEMY_COLORS = ['#e44', '#f84', '#e8e', '#4ce'];
const ENEMY_SPAWNS = [
  { x: 0, y: 0 },
  { x: (COLS / 2 - 1) * CELL, y: 0 },
  { x: (COLS - 2) * CELL, y: 0 },
];

function spawnEnemy() {
  if (enemiesSpawned >= totalEnemies) return;
  if (enemies.filter(e => e.alive).length >= maxEnemiesOnScreen) return;

  const spawn = ENEMY_SPAWNS[Math.floor(Math.random() * 3)];
  const colorIdx = Math.min(Math.floor(enemiesSpawned / 5), ENEMY_COLORS.length - 1);
  const enemy = new Tank(spawn.x, spawn.y, DIR.DOWN, ENEMY_COLORS[colorIdx]);
  // 更难的敌人有更多血量
  enemy.hp = 1 + Math.floor(colorIdx / 2);
  enemy.speed = 1.2 + colorIdx * 0.2;

  if (!enemy.canMoveTo(enemy.x, enemy.y)) {
    // 尝试其他生成点
    for (const alt of ENEMY_SPAWNS) {
      enemy.x = alt.x;
      enemy.y = alt.y;
      if (enemy.canMoveTo(enemy.x, enemy.y)) break;
    }
    if (!enemy.canMoveTo(enemy.x, enemy.y)) return; // 所有点都被占了
  }

  enemies.push(enemy);
  enemiesSpawned++;
  enemiesRemaining = totalEnemies - enemiesSpawned + enemies.filter(e => e.alive).length;
}

// ==================== 敌人AI ====================
function updateEnemyAI(enemy) {
  enemy.aiDirTimer--;
  enemy.aiShootTimer--;

  // 随机改变方向
  if (enemy.aiDirTimer <= 0) {
    // 偏向朝基地方向
    const baseCX = (Math.floor(COLS / 2)) * CELL + CELL;
    const baseCY = (ROWS - 2) * CELL;
    const dx = baseCX - enemy.cx;
    const dy = baseCY - enemy.cy;

    let preferredDir;
    if (Math.abs(dx) > Math.abs(dy)) {
      preferredDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    } else {
      preferredDir = dy > 0 ? DIR.DOWN : DIR.UP;
    }

    // 70%概率选择偏好方向
    if (Math.random() < 0.7) {
      enemy.dir = preferredDir;
    } else {
      enemy.dir = Math.floor(Math.random() * 4);
    }
    enemy.aiDirTimer = 30 + Math.floor(Math.random() * 60);
  }

  // 移动
  if (!enemy.move(enemy.dir)) {
    // 撞墙换方向
    enemy.dir = Math.floor(Math.random() * 4);
    enemy.aiDirTimer = 20 + Math.floor(Math.random() * 40);
  }

  // 射击
  if (enemy.aiShootTimer <= 0) {
    const bullet = enemy.shoot();
    if (bullet) {
      bullets.push(bullet);
      sfxShoot();
    }
    enemy.aiShootTimer = 40 + Math.floor(Math.random() * 80);
  }
}

// ==================== 碰撞检测 ====================
function checkBulletTankCollision(bullet, tank) {
  return (
    bullet.x > tank.x && bullet.x < tank.x + tank.size &&
    bullet.y > tank.y && bullet.y < tank.y + tank.size
  );
}

function checkBulletBulletCollision(b1, b2) {
  if (b1.isPlayer === b2.isPlayer) return false;
  return Math.abs(b1.x - b2.x) < 8 && Math.abs(b1.y - b2.y) < 8;
}

// ==================== 开始/重置 ====================
function startGame() {
  initAudio();
  document.getElementById('overlay').classList.add('hidden');
  gameState = 'playing';
  score = 0;
  playerLives = 3;
  level = 1;
  resetLevel();
}

function resetLevel() {
  const mapIdx = (level - 1) % MAPS.length;
  map = parseMap(MAPS[mapIdx]);
  baseAlive = true;
  enemies = [];
  bullets = [];
  particles = [];
  powerUps = [];
  enemiesSpawned = 0;
  totalEnemies = 12 + level * 4;
  enemiesRemaining = totalEnemies;
  maxEnemiesOnScreen = Math.min(4 + level, 8);
  spawnTimer = 0;
  spawnInterval = Math.max(60, 120 - level * 8);
  shakeTimer = 0;
  shakeIntensity = 0;

  // 玩家出生点
  player = new Tank(
    Math.floor(COLS / 2 - 1) * CELL,
    (ROWS - 2) * CELL - CELL * 2,
    DIR.UP,
    '#4f4',
    true
  );
  player.hp = 1;
}

function respawnPlayer() {
  if (playerLives <= 0) {
    gameOver();
    return;
  }
  player = new Tank(
    Math.floor(COLS / 2 - 1) * CELL,
    (ROWS - 2) * CELL - CELL * 2,
    DIR.UP,
    '#4f4',
    true
  );
  player.hp = 1;
  player.flashTimer = 90; // 无敌时间
}

function gameOver() {
  gameState = 'gameover';
  sfxGameOver();
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>游 戏 结 束</h1>
    <h2>GAME OVER</h2>
    <p style="color:#ffcc00;font-size:20px;">最终得分: ${score}</p>
    <p style="color:#aaa;">到达第 ${level} 关</p>
    <button onclick="startGame()">重 新 开 始</button>
    <div class="info">
      <span>↑↓←→</span> 或 <span>WASD</span> 移动 &nbsp;|&nbsp; <span>空格</span> 射击
    </div>
  `;
}

function levelComplete() {
  if (level >= 99) {
    gameState = 'win';
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h1 style="color:#0f0;">胜 利 !</h1>
      <h2>ALL CLEAR!</h2>
      <p style="color:#ffcc00;font-size:20px;">最终得分: ${score}</p>
      <button onclick="startGame()">再 玩 一 次</button>
    `;
    return;
  }
  level++;
  playerLives = Math.min(playerLives + 1, 5);
  resetLevel();
}

// ==================== 主循环 ====================
function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  // 更新抖动
  if (shakeTimer > 0) shakeTimer--;

  // 玩家输入
  if (player && player.alive) {
    let moved = false;
    if (keys['ArrowUp'] || keys['KeyW'])    moved = player.move(DIR.UP) || moved;
    if (keys['ArrowDown'] || keys['KeyS'])  moved = player.move(DIR.DOWN) || moved;
    if (keys['ArrowLeft'] || keys['KeyA'])  moved = player.move(DIR.LEFT) || moved;
    if (keys['ArrowRight'] || keys['KeyD']) moved = player.move(DIR.RIGHT) || moved;

    if (keys['Space']) {
      const bullet = player.shoot();
      if (bullet) {
        bullets.push(bullet);
        sfxShoot();
      }
    }

    player.update();
  }

  // 敌人生成
  spawnTimer++;
  if (spawnTimer >= spawnInterval && enemiesSpawned < totalEnemies) {
    spawnTimer = 0;
    spawnEnemy();
  }

  // 敌人更新
  for (let enemy of enemies) {
    if (!enemy.alive) continue;
    updateEnemyAI(enemy);
    enemy.update();
  }

  // 子弹更新
  for (let bullet of bullets) {
    if (!bullet.alive) continue;
    bullet.update();
  }

  // 子弹碰撞
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.alive) { bullets.splice(i, 1); continue; }

    if (b.isPlayer) {
      // 玩家子弹 vs 敌人
      for (let enemy of enemies) {
        if (!enemy.alive) continue;
        if (checkBulletTankCollision(b, enemy)) {
          b.alive = false;
          enemy.hp--;
          if (enemy.hp <= 0) {
            enemy.alive = false;
            spawnParticles(enemy.cx, enemy.cy, enemy.color, 15);
            sfxExplode();
            score += 100;
            enemiesRemaining = totalEnemies - enemiesSpawned + enemies.filter(e => e.alive).length;
            // 偶尔掉落道具
            if (Math.random() < 0.15) {
              const types = ['star', 'tank', 'timer', 'bomb', 'shield'];
              const type = types[Math.floor(Math.random() * types.length)];
              powerUps.push(new PowerUp(enemy.x, enemy.y, type));
            }
          }
          break;
        }
      }
    } else {
      // 敌人子弹 vs 玩家
      if (player && player.alive && player.flashTimer <= 0 && checkBulletTankCollision(b, player)) {
        b.alive = false;
        player.alive = false;
        spawnParticles(player.cx, player.cy, '#4f4', 15);
        sfxExplode();
        playerLives--;
        shakeTimer = 15;
        shakeIntensity = 5;
        setTimeout(respawnPlayer, 1000);
      }
    }

    // 子弹互撞
    for (let j = bullets.length - 1; j > i; j--) {
      const b2 = bullets[j];
      if (!b2.alive) continue;
      if (checkBulletBulletCollision(b, b2)) {
        b.alive = false;
        b2.alive = false;
        spawnParticles((b.x + b2.x) / 2, (b.y + b2.y) / 2, '#fff', 5);
      }
    }
  }

  // 道具拾取
  for (let pu of powerUps) {
    if (!pu.alive) continue;
    pu.update();
    if (player && player.alive && player.collidesWith(pu.x, pu.y, pu.size, pu.size)) {
      pu.alive = false;
      sfxPowerUp();
      switch (pu.type) {
        case 'star': score += 300; break;
        case 'tank': playerLives = Math.min(playerLives + 1, 9); break;
        case 'timer':
          for (let e of enemies) e.aiShootTimer += 120;
          break;
        case 'bomb':
          for (let e of enemies) {
            if (e.alive) { e.alive = false; score += 50; spawnParticles(e.cx, e.cy, '#f00', 10); }
          }
          enemiesRemaining = totalEnemies - enemiesSpawned + enemies.filter(e => e.alive).length;
          break;
        case 'shield':
          player.flashTimer = 300;
          break;
      }
    }
  }
  powerUps = powerUps.filter(p => p.alive);

  // 清理
  enemies = enemies.filter(e => e.alive);
  bullets = bullets.filter(b => b.alive);

  // 检查基地
  if (!baseAlive) {
    gameOver();
    return;
  }

  // 检查胜利
  if (enemiesSpawned >= totalEnemies && enemies.filter(e => e.alive).length === 0) {
    levelComplete();
  }
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // 屏幕抖动
  ctx.save();
  if (shakeTimer > 0) {
    const intensity = shakeIntensity * (shakeTimer / 30);
    ctx.translate(
      (Math.random() - 0.5) * intensity * 2,
      (Math.random() - 0.5) * intensity * 2
    );
  }

  // 游戏背景
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // 绘制地图
  drawMap(ctx);

  // 绘制道具
  for (let pu of powerUps) pu.draw(ctx);

  // 绘制坦克
  if (player && player.alive) player.draw(ctx);
  for (let enemy of enemies) enemy.draw(ctx);

  // 绘制子弹
  for (let bullet of bullets) bullet.draw(ctx);

  // 覆盖树木 (在坦克上方)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (map[r][c] === TILE.TREE) {
        const x = c * CELL, y = r * CELL;
        ctx.fillStyle = '#2d5a1e';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.fillStyle = '#3a7a28';
        // 用种子固定随机外观
        const seed = r * 100 + c;
        for (let i = 0; i < 8; i++) {
          const sx = ((seed * 37 + i * 13) % 80) / 100;
          const sy = ((seed * 53 + i * 17) % 80) / 100;
          const lx = x + sx * CELL * 0.7 + CELL * 0.15;
          const ly = y + sy * CELL * 0.7 + CELL * 0.15;
          ctx.beginPath();
          ctx.arc(lx, ly, 3 + ((seed + i) % 4), 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // 绘制粒子
  drawParticles(ctx);

  ctx.restore();

  // 绘制HUD
  drawHUD(ctx);

  // 暂停遮罩
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('暂 停', CANVAS_W / 2, CANVAS_H / 2);
    ctx.font = '16px "Courier New"';
    ctx.fillText('按 P 继续', CANVAS_W / 2, CANVAS_H / 2 + 40);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ==================== 输入处理 ====================
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'KeyP' && gameState === 'playing') {
    gameState = 'paused';
  } else if (e.code === 'KeyP' && gameState === 'paused') {
    gameState = 'playing';
  }

  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
      e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// 触摸控制 (移动端)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  if (gameState === 'menu') startGame();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  if (tx < GAME_W / 3) keys['ArrowLeft'] = true;
  else if (tx > GAME_W * 2 / 3) keys['ArrowRight'] = true;
  if (ty < GAME_H / 3) keys['ArrowUp'] = true;
  else if (ty > GAME_H * 2 / 3) keys['ArrowDown'] = true;
  if (tx > GAME_W / 3 && tx < GAME_W * 2 / 3 && ty > GAME_H / 3 && ty < GAME_H * 2 / 3) {
    keys['Space'] = true;
  }
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  keys['ArrowLeft'] = tx < GAME_W / 3;
  keys['ArrowRight'] = tx > GAME_W * 2 / 3;
  keys['ArrowUp'] = ty < GAME_H / 3;
  keys['ArrowDown'] = ty > GAME_H * 2 / 3;
  keys['Space'] = tx > GAME_W / 3 && tx < GAME_W * 2 / 3 && ty > GAME_H / 3 && ty < GAME_H * 2 / 3;
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  keys['ArrowUp'] = keys['ArrowDown'] = keys['ArrowLeft'] = keys['ArrowRight'] = keys['Space'] = false;
});

// ==================== 启动 ====================
// 初始绘制
ctx.fillStyle = '#1a1a2e';
ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
drawHUD(ctx);
ctx.fillStyle = '#888';
ctx.font = '16px "Courier New"';
ctx.textAlign = 'center';
ctx.fillText('按"开始游戏"或触摸屏幕', CANVAS_W / 2, CANVAS_H / 2);

// 预加载第一关地图用于展示
map = parseMap(MAPS[0]);
baseAlive = true;
enemies = [];
bullets = [];
particles = [];
powerUps = [];
player = null;
draw();

gameLoop();
</script>
